  <script>
(function () {
  const KEY = "useOld7Frame";

  function getFlag() {
    return localStorage.getItem(KEY) === "1";
  }
  function setFlag(v) {
    localStorage.setItem(KEY, v ? "1" : "0");
  }

  // 1) Hook: si se pide champion-frame-7.png y el toggle está activo -> usar old_champion-frame-7.png
  try {
    const desc = Object.getOwnPropertyDescriptor(HTMLImageElement.prototype, "src");
    if (desc && typeof desc.set === "function" && typeof desc.get === "function") {
      Object.defineProperty(HTMLImageElement.prototype, "src", {
        get: desc.get,
        set: function (value) {
          try {
            if (getFlag() && typeof value === "string" && value.includes("champion-frame-7.png") && !value.includes("old_champion-frame-7.png")) {
              value = value.replace("champion-frame-7.png", "old_champion-frame-7.png");
            }
          } catch (e) {}
          return desc.set.call(this, value);
        },
        configurable: true,
        enumerable: true
      });
    }
  } catch (e) {}

  // 2) UI: insertar checkbox justo debajo del label que contiene "ESTA DUPLICADO?"
  function injectCheckbox() {
    const labels = Array.from(document.querySelectorAll("label"));
    const target = labels.find(l => (l.textContent || "").trim().toUpperCase().includes("ESTA DUPLICADO"));
    if (!target) return false;

    // Evitar duplicados si recarga/SPA
    if (document.getElementById("toggle-old-7frame")) return true;

    const wrap = document.createElement("label");
    wrap.style.display = "flex";
    wrap.style.alignItems = "center";
    wrap.style.gap = "8px";
    wrap.style.marginTop = "8px";

    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.id = "toggle-old-7frame";
    cb.checked = getFlag();

    const span = document.createElement("span");
    span.textContent = "Usar marco 7★ antiguo";

    cb.addEventListener("change", () => {
      setFlag(cb.checked);
      // refresco “bruto” para que se re-carguen imágenes con el nuevo comportamiento
      location.reload();
    });

    wrap.appendChild(cb);
    wrap.appendChild(span);

    // Insertar justo debajo del bloque del "ESTA DUPLICADO?"
    target.insertAdjacentElement("afterend", wrap);
    return true;
  }

  // Esperar a que la app pinte el formulario
  let tries = 0;
  const timer = setInterval(() => {
    tries++;
    if (injectCheckbox() || tries > 80) clearInterval(timer);
  }, 100);
})();
</script>
  <script>
(function () {
  function fixFringe(canvas) {
    try {
      const ctx = canvas.getContext("2d", { willReadFrequently: true });
      if (!ctx) return;

      const w = canvas.width, h = canvas.height;
      if (!w || !h) return;

      const img = ctx.getImageData(0, 0, w, h);
      const d = img.data;

      // Helper: índice de pixel
      const idx = (x, y) => (y * w + x) * 4;

      // 1) Premultiply: elimina halos por RGB en transparente puro
      for (let i = 0; i < d.length; i += 4) {
        const a = d[i + 3] / 255;
        if (a === 0) { d[i] = 0; d[i+1] = 0; d[i+2] = 0; continue; }
        if (a === 1) continue;
        d[i]   = Math.round(d[i]   * a);
        d[i+1] = Math.round(d[i+1] * a);
        d[i+2] = Math.round(d[i+2] * a);
      }

      // 2) De-fringe: para bordes semitransparentes "blancos", copiar color del vecino más opaco
      //    (Esto quita el reborde blanco feo sin perder transparencia)
      for (let y = 1; y < h - 1; y++) {
        for (let x = 1; x < w - 1; x++) {
          const p = idx(x, y);
          const a = d[p + 3];

          // Solo píxeles semitransparentes
          if (a <= 0 || a >= 255) continue;

          const r = d[p], g = d[p + 1], b = d[p + 2];
          const avg = (r + g + b) / 3;

          // Si el píxel del borde está "demasiado blanco", suele ser matte
          // Ajusta el umbral si quieres (220 suele ir fino)
          if (avg < 220) continue;

          // Buscar vecino con mayor alfa (más "interior")
          let bestA = -1, bestR = r, bestG = g, bestB = b;

          for (let ny = y - 1; ny <= y + 1; ny++) {
            for (let nx = x - 1; nx <= x + 1; nx++) {
              if (nx === x && ny === y) continue;
              const q = idx(nx, ny);
              const na = d[q + 3];
              if (na > bestA) {
                bestA = na;
                bestR = d[q];
                bestG = d[q + 1];
                bestB = d[q + 2];
              }
            }
          }

          // Solo si encontramos un vecino bastante opaco (evita contaminar zonas realmente transparentes)
          if (bestA >= 200) {
            d[p]     = bestR;
            d[p + 1] = bestG;
            d[p + 2] = bestB;
          }
        }
      }

      ctx.putImageData(img, 0, 0);
    } catch (e) {}
  }

  // Parchear exportación PNG (toDataURL y toBlob)
  const origToDataURL = HTMLCanvasElement.prototype.toDataURL;
  HTMLCanvasElement.prototype.toDataURL = function () {
    fixFringe(this);
    return origToDataURL.apply(this, arguments);
  };

  const origToBlob = HTMLCanvasElement.prototype.toBlob;
  if (origToBlob) {
    HTMLCanvasElement.prototype.toBlob = function () {
      fixFringe(this);
      return origToBlob.apply(this, arguments);
    };
  }
})();
</script>
